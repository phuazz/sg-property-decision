name: Refresh live data

on:
  schedule:
    - cron: "0 2 * * 1"   # Mondays 02:00 UTC — after the weekend, ahead of the SG week
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pandas openpyxl pyproj

      - name: Fetch live data
        env:
          URA_ACCESS_KEY: ${{ secrets.URA_ACCESS_KEY }}   # optional — official segment $psf lights up if set
        run: python scripts/fetch_data.py

      - name: Build page
        run: python scripts/pipeline.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json docs/index.html
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "Refresh live data ($(date -u +%Y-%m-%d))"
            git push
          fi
